<div class="employees-container">
  <div class="header">
    <h1>Gestion des Employés</h1>
  </div>

  <mat-card>
    <mat-card-content>
      <div class="table-container">
        <table mat-table [dataSource]="dataSource" class="employees-table">
          <!-- Name Column -->
          <ng-container matColumnDef="name">
            <th mat-header-cell *matHeaderCellDef>Nom</th>
            <td mat-cell *matCellDef="let employee">
              <div class="employee-cell">
                <mat-icon>work</mat-icon>
                <span>{{ employee.name }}</span>
                <mat-icon *ngIf="employee.isVerified" color="primary" class="verified-icon">verified</mat-icon>
              </div>
            </td>
          </ng-container>

          <!-- Profession Column -->
          <ng-container matColumnDef="profession">
            <th mat-header-cell *matHeaderCellDef>Profession</th>
            <td mat-cell *matCellDef="let employee">{{ employee.profession }}</td>
          </ng-container>

          <!-- Rating Column -->
          <ng-container matColumnDef="rating">
            <th mat-header-cell *matHeaderCellDef>Note</th>
            <td mat-cell *matCellDef="let employee">
              <div class="rating-cell">
                <mat-icon>star</mat-icon>
                <span>{{ employee.rating | number: '1.1-1' }}</span>
                <span class="review-count">({{ employee.reviewCount }})</span>
              </div>
            </td>
          </ng-container>

          <!-- Status Column -->
          <ng-container matColumnDef="status">
            <th mat-header-cell *matHeaderCellDef>Statut</th>
            <td mat-cell *matCellDef="let employee">
              <mat-chip [class]="getStatusClass(employee.status)">
                {{ getStatusLabel(employee.status) }}
              </mat-chip>
            </td>
          </ng-container>

          <!-- Verified Column -->
          <ng-container matColumnDef="verified">
            <th mat-header-cell *matHeaderCellDef>Vérifié</th>
            <td mat-cell *matCellDef="let employee">
              <mat-icon [color]="employee.isVerified ? 'primary' : ''">
                {{ employee.isVerified ? 'verified' : 'cancel' }}
              </mat-icon>
            </td>
          </ng-container>

          <!-- Actions Column -->
          <ng-container matColumnDef="actions">
            <th mat-header-cell *matHeaderCellDef>Actions</th>
            <td mat-cell *matCellDef="let employee">
              <button
                mat-icon-button
                *ngIf="!employee.isVerified"
                color="primary"
                (click)="verifyEmployee(employee)"
                matTooltip="Vérifier">
                <mat-icon>verified</mat-icon>
              </button>
              <button
                mat-icon-button
                [matMenuTriggerFor]="statusMenu"
                matTooltip="Changer le statut">
                <mat-icon>more_vert</mat-icon>
              </button>
              <mat-menu #statusMenu="matMenu">
                <button mat-menu-item (click)="updateStatus(employee, 'active')">
                  Actif
                </button>
                <button mat-menu-item (click)="updateStatus(employee, 'pending_moderation')">
                  En attente
                </button>
                <button mat-menu-item (click)="updateStatus(employee, 'suspended')">
                  Suspendu
                </button>
              </mat-menu>
            </td>
          </ng-container>

          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
        </table>

        <mat-paginator
          [length]="totalElements"
          [pageSize]="pageSize"
          [pageSizeOptions]="[10, 20, 50, 100]"
          (page)="onPageChange($event)">
        </mat-paginator>
      </div>
    </mat-card-content>
  </mat-card>
</div>
